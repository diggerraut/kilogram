<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilogram | Google Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* Переменные тем (Светлая по умолчанию) */
        :root {
            --bg-app: #ccd3d9;
            --sidebar-bg: #ffffff;
            --main-bg: #e7ebf0;
            --text-color: #000000;
            --header-bg: #ffffff;
            --bubble-in: #ffffff;
            --bubble-out: #effdde;
            --tg-blue: #2481cc;
            --border: #dfe1e5;
        }

        /* Цвета темной темы */
        body.dark-mode {
            --bg-app: #0f1621;
            --sidebar-bg: #17212b;
            --main-bg: #0e1621;
            --text-color: #ffffff;
            --header-bg: #17212b;
            --bubble-in: #182533;
            --bubble-out: #2b5278;
            --border: #0e1621;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg-app); margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text-color); transition: 0.3s; }
        .app { width: 1100px; height: 90vh; background: var(--sidebar-bg); display: flex; border-radius: 12px; overflow: hidden; box-shadow: 0 15px 50px rgba(0,0,0,0.3); }
        
        .sidebar { width: 350px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--sidebar-bg); }
        .search-area { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-area input { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #f1f1f1; outline: none; }
        body.dark-mode .search-area input { background: #242f3d; color: white; }

        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; color: #707579; }
        .tab.active { color: var(--tg-blue); border-bottom: 3px solid var(--tg-blue); }

        .main { flex: 1; display: flex; flex-direction: column; background: var(--main-bg); }
        .header { height: 60px; background: var(--header-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 15px; justify-content: space-between; }
        
        #msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 15px; font-size: 14.5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); color: var(--text-color); }
        .bubble.in { background: var(--bubble-in); align-self: flex-start; border-bottom-left-radius: 2px; }
        .bubble.out { background: var(--bubble-out); align-self: flex-end; border-bottom-right-radius: 2px; color: white; }

        .footer { background: var(--header-bg); padding: 15px 20px; display: none; border-top: 1px solid var(--border); }
        .footer input { flex: 1; border: none; outline: none; background: transparent; color: var(--text-color); font-size: 16px; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--tg-blue); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; width: 350px; text-align: center; }
        .google-btn { background: #4285F4; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; display: flex; justify-content: center; align-items: center; gap: 10px; }

        .item { padding: 12px 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .avatar { width: 45px; height: 45px; border-radius: 50%; }
        .theme-toggle { cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color:var(--tg-blue)">Kilogram</h1>
        <p>Добро пожаловать в мессенджер</p>
        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Войти через Google
        </button>
    </div>
</div>

<div class="app">
    <div class="sidebar">
        <div class="search-area"><input type="text" id="search-input" placeholder="Поиск..." oninput="searchItems()"></div>
        <div class="tabs">
            <div id="tab-chats" class="tab active" onclick="setTab('chats')">ЧАТЫ</div>
            <div id="tab-channels" class="tab" onclick="setTab('channels')">КАНАЛЫ</div>
        </div>
        <div id="list"></div>
        <button id="btn-admin" onclick="createNewChannel()" style="display:none; background:#34c759; color:white; border:none; padding:10px; cursor:pointer;">+ Создать канал</button>
    </div>

    <div class="main">
        <div class="header">
            <div style="display:flex; align-items:center; gap:10px;">
                <div id="h-avatar"></div>
                <div id="h-name"><b>Kilogram</b></div>
            </div>
            <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
        </div>
        <div id="msgs"></div>
        <div class="footer" id="chat-footer">
            <div style="display:flex; gap:10px;">
                <input type="text" id="m-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()" style="border:none; background:none; color:var(--tg-blue); font-weight:bold; cursor:pointer;">ОТПРАВИТЬ</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyByFLOBj-gi28L6byjckogJWWKHU2UF4w8",
        authDomain: "kilogramdatabase.firebaseapp.com",
        projectId: "kilogramdatabase",
        databaseURL: "https://kilogramdatabase-default-rtdb.firebaseio.com",
        storageBucket: "kilogramdatabase.firebasestorage.app",
        messagingSenderId: "429034551675",
        appId: "1:429034551675:web:5273c097400ffba70b25de"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signOut(); // Всегда выходим при запуске

    let currentMode = 'chats';
    let activeId = null;

    // --- Google Вход ---
    function loginWithGoogle() {
        auth.signInWithPopup(provider).then(res => {
            const user = res.user;
            db.ref('users/' + user.uid).set({
                name: user.displayName,
                email: user.email,
                uid: user.uid,
                photo: user.photoURL
            });
        }).catch(e => alert(e.message));
    }

    auth.onAuthStateChanged(user => {
        if(user) {
            document.getElementById('auth-screen').style.display = 'none';
            // Проверка на админа (через email гугла)
            if(user.email === 'твой-админ-email@gmail.com' || user.displayName === 'Kilogram') {
                document.getElementById('btn-admin').style.display = 'block';
            }
            renderList();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
        }
    });

    // --- Темная тема ---
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    // --- Логика списка и сообщений ---
    function setTab(mode) {
        currentMode = mode;
        document.getElementById('tab-chats').classList.toggle('active', mode === 'chats');
        document.getElementById('tab-channels').classList.toggle('active', mode === 'channels');
        renderList();
    }

    function renderList() {
        const path = currentMode === 'chats' ? 'users' : 'channels';
        db.ref(path).on('value', snap => {
            const list = document.getElementById('list');
            list.innerHTML = '';
            snap.forEach(child => {
                const data = child.val();
                if(data.uid === auth.currentUser.uid) return;
                const name = data.name || data.email.split('@')[0];
                const pic = data.photo || `https://robohash.org/${child.key}?set=set4`;

                list.innerHTML += `
                    <div class="item" onclick="selectTarget('${child.key}', '${name}', '${pic}')">
                        <img src="${pic}" class="avatar">
                        <div>
                            <b>${name} ${name === 'Kilogram' ? '✔️' : ''}</b>
                            <small style="display:block; color:gray">${currentMode === 'chats' ? 'онлайн' : 'подписчики'}</small>
                        </div>
                    </div>`;
            });
        });
    }

    function selectTarget(id, name, pic) {
        activeId = id;
        document.getElementById('chat-footer').style.display = 'block';
        document.getElementById('h-name').innerHTML = `<b>${name}</b>`;
        document.getElementById('h-avatar').innerHTML = `<img src="${pic}" class="avatar" style="width:35px;height:35px">`;
        loadMessages();
    }

    function loadMessages() {
        const myId = auth.currentUser.uid;
        const key = currentMode === 'chats' ? (myId < activeId ? myId+activeId : activeId+myId) : 'chan_'+activeId;
        db.ref('msgs/' + key).on('value', snap => {
            const box = document.getElementById('msgs');
            box.innerHTML = '';
            snap.forEach(child => {
                const m = child.val();
                box.innerHTML += `<div class="bubble ${m.sender === myId ? 'out' : 'in'}">${m.text}</div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function sendMsg() {
        const val = document.getElementById('m-input').value;
        if(!val || !activeId) return;
        const myId = auth.currentUser.uid;
        const key = currentMode === 'chats' ? (myId < activeId ? myId+activeId : activeId+myId) : 'chan_'+activeId;
        db.ref('msgs/' + key).push({ sender: myId, text: val, time: Date.now() });
        document.getElementById('m-input').value = '';
    }

    function searchItems() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.item').forEach(i => i.style.display = i.innerText.toLowerCase().includes(q) ? 'flex' : 'none');
    }
</script>
</body>
</html>
